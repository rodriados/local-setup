# Personal workspace setup automation.
# @file The essentials installation tasks list.
# @author Rodrigo Siqueira <me@rodriados.com>
# @copyright 2026-present Rodrigo Siqueira

- name: Install Development Essentials for Linux
  when: ansible_facts.system == "Linux"
  ignore_errors: true
  block:
    - name: Install Build-Essential
      ansible.builtin.package:
        name: build-essential
        state: present
      become: true

- name: Install Development Essentials for MacOS
  when: ansible_facts.system == "Darwin"
  ignore_errors: true
  block:
    - name: Install Command Line Tools
      ansible.builtin.include_role:
        name: elliotweiser.osx-command-line-tools

    - name: Install Homebrew
      ansible.builtin.include_role:
        name: geerlingguy.mac.homebrew
