---
# Personal workspace setup automation.
# @file The initial playbook to perform system installation.
# @author Rodrigo Siqueira <me@rodriados.com>
# @copyright 2026-present Rodrigo Siqueira
- name: Workstation Setup
  hosts: local

  vars_files:
    - vars/main.yml
    - overrides.yml

  vars:
    ansible_user_home: "{{ lookup('env', 'HOME') }}"

  tasks:
    - name: Include Minimal Role
      ansible.builtin.include_role:
        name: rodriados.minimal
      tags:
        - minimal
        - always

    - name: Include Docker Role
      ansible.builtin.include_role:
        name: rodriados.docker
      tags:
        - docker
        - never

    - name: Include Personal Role
      ansible.builtin.include_role:
        name: rodriados.personal
      tags:
        - personal
        - never
